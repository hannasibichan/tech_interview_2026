<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | FOSS Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background:
        radial-gradient(ellipse 80% 55% at 50% -10%, rgba(59, 130, 246, 0.22) 0%, transparent 65%),
        linear-gradient(160deg, #080e1b 0%, #0f172a 55%, #0d1f40 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 25%, rgba(59, 130, 246, 0.1) 0%, transparent 35%),
        radial-gradient(circle at 85% 75%, rgba(99, 102, 241, 0.08) 0%, transparent 35%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 52px 56px 48px;
      max-width: 480px;
      width: 100%;
      backdrop-filter: blur(12px);
      box-shadow:
        0 0 0 1px rgba(59, 130, 246, 0.08),
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 80px rgba(59, 130, 246, 0.06);
      animation: fadeInUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(28px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .badge {
      font-size: 3.5rem;
      margin-bottom: 20px;
      display: inline-block;
      animation: pulse 2.5s ease-in-out infinite;
      filter: drop-shadow(0 0 16px rgba(59, 130, 246, 0.5));
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        filter: drop-shadow(0 0 14px rgba(59, 130, 246, 0.4));
      }

      50% {
        transform: scale(1.08);
        filter: drop-shadow(0 0 26px rgba(99, 102, 241, 0.6));
      }
    }

    h1 {
      font-size: 2.1rem;
      font-weight: 800;
      margin-bottom: 14px;
      letter-spacing: -0.4px;
      line-height: 1.15;
      background: linear-gradient(90deg, #e2e8f0 20%, #93c5fd 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 1rem;
      color: #64748b;
      max-width: 360px;
      margin: 0 auto 34px;
      line-height: 1.6;
    }

    .back-btn {
      display: inline-block;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      padding: 12px 30px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 18px rgba(59, 130, 246, 0.38);
    }

    .back-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(59, 130, 246, 0.55);
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.78rem;
      color: #334155;
      letter-spacing: 0.2px;
    }

    @media (max-width: 520px) {
      .container {
        padding: 40px 28px 36px;
      }

      h1 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="badge">🚀</div>
    <h1>Registrations Opening Soon!</h1>
    <p>We're working hard to set things up. Check back shortly — exciting events are coming your way!</p>
    <a href="index.html" class="back-btn">← Back to Events</a>
  </div>
  <footer>© 2026 FOSS Club – LBS Institute of Technology for Women</footer>
</body>

</html>
