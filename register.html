<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | FOSS Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #1d3a5f 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .badge {
      font-size: 4rem;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 14px;
      background: linear-gradient(90deg, #60a5fa, #93c5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      font-size: 1.05rem;
      color: #94a3b8;
      max-width: 420px;
      margin: 0 auto 32px;
    }
    .back-btn {
      display: inline-block;
      background-color: #3b82f6;
      color: white;
      padding: 11px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s, transform 0.15s;
    }
    .back-btn:hover {
      background-color: #2563eb;
      transform: translateY(-2px);
    }
    footer {
      position: absolute;
      bottom: 16px;
      font-size: 0.8rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="badge">🚀</div>
  <h1>Registrations Opening Soon!</h1>
  <p>We're working hard to set things up. Check back shortly — exciting events are coming your way!</p>
  <a href="index.html" class="back-btn">← Back to Events</a>
  <footer>© 2026 FOSS Club – LBS Institute of Technology for Women</footer>
</body>
</html>
